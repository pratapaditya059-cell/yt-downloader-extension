<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>YouTube Video Info</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="body">
    <img id="thumbnail" src="" alt="Video Thumbnail" style="width: 100%; height: auto; margin-bottom: 10px; border-radius: 7px;">
    <div id="title">Loading video info...</div>
    <div id="channel"></div>
    <div id="videoId"></div>
    <button id="copyURLBtn"> Copy Video URL</button>
    <div id="status">Loading formats...</div>
    <select id="formats" style="display:none;">
  <option value="">Select Format</option>
</select>
    <button id="downloadBtn"> Download Video</button>
    <script src="popup.js"></script>
  </body>
</html>
